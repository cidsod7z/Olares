apiVersion: apps/v1
kind: Deployment
metadata:
  name: rcv1inline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rcv1inline
  template:
    metadata:
      labels:
        app: rcv1inline
    spec:
      containers:
        - name: main
          image: nginx:1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
