name: Install Wizard Release
'on':
  workflow_dispatch:
    inputs:
      tags:
        description: Release Tags
jobs:
  release-id:
    runs-on: ubuntu-latest
    outputs:
      id: ${{ steps.generate.outputs.id }}
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.inputs.tags }}
    - id: generate
      run: 'hash=$(git rev-parse --short=7 HEAD)

        echo "id=$hash" >> "$GITHUB_OUTPUT"

        '
  release-cli:
    needs:
    - release-id
    uses: ./.github/workflows/release-cli.yaml
    secrets: inherit
    with:
      version: ${{ github.event.inputs.tags }}
      release-id: ${{ needs.release-id.outputs.id }}
      ref: ${{ github.event.inputs.tags }}
  release-daemon:
    needs:
    - release-id
    uses: ./.github/workflows/release-daemon.yaml
    secrets: inherit
    with:
      version: ${{ github.event.inputs.tags }}
      release-id: ${{ needs.release-id.outputs.id }}
      ref: ${{ github.event.inputs.tags }}
  push:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.inputs.tags }}
    - name: Install coscmd
      run: pip install coscmd
    - name: Configure coscmd
      env:
        TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
        TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        COS_BUCKET: ${{ secrets.COS_BUCKET }}
        COS_REGION: ${{ secrets.COS_REGION }}
        END_POINT: ${{ secrets.END_POINT }}
      run: "coscmd config -a $TENCENT_SECRET_ID \\\n              -s $TENCENT_SECRET_KEY\
        \ \\\n              -b $COS_BUCKET \\\n              -r $COS_REGION \n"
    - env:
        VERSION: ${{ github.event.inputs.tags }}
      run: 'bash build/image-manifest.sh && bash build/upload-images.sh .manifest/images.mf

        '
  push-arm64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.inputs.tags }}
    - name: Install coscmd
      run: pip install coscmd
    - name: Configure coscmd
      env:
        TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
        TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        COS_BUCKET: ${{ secrets.COS_BUCKET }}
        COS_REGION: ${{ secrets.COS_REGION }}
        END_POINT: ${{ secrets.END_POINT }}
      run: "coscmd config -a $TENCENT_SECRET_ID \\\n              -s $TENCENT_SECRET_KEY\
        \ \\\n              -b $COS_BUCKET \\\n              -r $COS_REGION \n"
    - env:
        VERSION: ${{ github.event.inputs.tags }}
      run: 'export PATH=$PATH:/usr/local/bin:/home/ubuntu/.local/bin

        bash build/image-manifest.sh && bash build/upload-images.sh .manifest/images.mf
        linux/arm64

        '
  push-deps:
    needs:
    - release-daemon
    - release-id
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
    - name: Install coscmd
      run: pip install coscmd
    - name: Configure coscmd
      env:
        TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
        TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        COS_BUCKET: ${{ secrets.COS_BUCKET }}
        COS_REGION: ${{ secrets.COS_REGION }}
        END_POINT: ${{ secrets.END_POINT }}
      run: "coscmd config -a $TENCENT_SECRET_ID \\\n              -s $TENCENT_SECRET_KEY\
        \ \\\n              -b $COS_BUCKET \\\n              -r $COS_REGION \n"
    - env:
        VERSION: ${{ github.event.inputs.tags }}
        RELEASE_ID: ${{ needs.release-id.outputs.id }}
        REPO_PATH: ${{ secrets.REPO_PATH }}
      run: 'bash build/deps-manifest.sh && bash build/upload-deps.sh

        '
  push-deps-arm64:
    needs:
    - release-daemon
    - release-id
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
    - name: Install coscmd
      run: pip install coscmd
    - name: Configure coscmd
      env:
        TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
        TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        COS_BUCKET: ${{ secrets.COS_BUCKET }}
        COS_REGION: ${{ secrets.COS_REGION }}
        END_POINT: ${{ secrets.END_POINT }}
      run: "coscmd config -a $TENCENT_SECRET_ID \\\n              -s $TENCENT_SECRET_KEY\
        \ \\\n              -b $COS_BUCKET \\\n              -r $COS_REGION \n"
    - env:
        VERSION: ${{ github.event.inputs.tags }}
        RELEASE_ID: ${{ needs.release-id.outputs.id }}
        REPO_PATH: ${{ secrets.REPO_PATH }}
      run: 'export PATH=$PATH:/usr/local/bin:/home/ubuntu/.local/bin

        bash build/deps-manifest.sh linux/arm64 && bash build/upload-deps.sh linux/arm64

        '
  upload-package:
    needs:
    - push
    - push-arm64
    - push-deps
    - push-deps-arm64
    - release-daemon
    - release-id
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.inputs.tags }}
    - name: Package installer
      run: 'bash build/build.sh ${{ github.event.inputs.tags }} ${{ needs.release-id.outputs.id
        }}

        '
    - name: Install coscmd
      run: pip install coscmd
    - name: Configure coscmd
      env:
        TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
        TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        COS_BUCKET: ${{ secrets.COS_BUCKET }}
        COS_REGION: ${{ secrets.COS_REGION }}
        END_POINT: ${{ secrets.END_POINT }}
      run: "coscmd config -a $TENCENT_SECRET_ID \\\n              -s $TENCENT_SECRET_KEY\
        \ \\\n              -b $COS_BUCKET \\\n              -r $COS_REGION \n"
    - name: Upload to COS
      run: 'md5sum install-wizard-v${{ github.event.inputs.tags }}.tar.gz > install-wizard-v${{
        github.event.inputs.tags }}.md5sum.txt && \

        coscmd upload install-wizard-v${{ github.event.inputs.tags }}.md5sum.txt ${{
        secrets.REPO_PATH }}install-wizard-v${{ github.event.inputs.tags }}.md5sum.txt
        && \

        coscmd upload install-wizard-v${{ github.event.inputs.tags }}.tar.gz ${{ secrets.REPO_PATH
        }}install-wizard-v${{ github.event.inputs.tags }}.tar.gz


        coscmd upload install-wizard-v${{ github.event.inputs.tags }}.md5sum.txt ${{
        secrets.REPO_PATH }}install-wizard-v${{ github.event.inputs.tags }}.${{ needs.release-id.outputs.id
        }}.md5sum.txt && \

        coscmd upload install-wizard-v${{ github.event.inputs.tags }}.tar.gz ${{ secrets.REPO_PATH
        }}install-wizard-v${{ github.event.inputs.tags }}.${{ needs.release-id.outputs.id
        }}.tar.gz

        '
  release:
    runs-on: ubuntu-latest
    needs:
    - upload-package
    - release-cli
    - release-id
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.inputs.tags }}
    - name: Update env
      working-directory: ./build/base-package
      run: 'echo ''DEBUG_VERSION="false"'' > .env

        '
    - name: Get checksum
      id: vars
      run: 'echo "version_md5sum=$(curl -sSfL https://cdn.olares.com${{ secrets.REPO_PATH
        }}install-wizard-v${{ github.event.inputs.tags }}.${{ needs.release-id.outputs.id
        }}.md5sum.txt|awk ''{print $1}'')" >> $GITHUB_OUTPUT

        '
    - name: Update checksum
      uses: eball/write-tag-to-version-file@latest
      with:
        filename: build/base-package/install.sh
        placeholder: '#__MD5SUM__'
        tag: ${{ steps.vars.outputs.version_md5sum }}
    - name: Package installer
      run: 'bash build/build.sh ${{ github.event.inputs.tags }} ${{ needs.release-id.outputs.id
        }}

        '
    - name: Archives
      run: 'cp .dist/install-wizard/install.sh build/base-package

        cp build/base-package/install.sh build/base-package/publicInstaller.sh

        cp build/base-package/install.sh build/base-package/publicInstaller.latest

        cp .dist/install-wizard/install.ps1 build/base-package

        cp build/base-package/install.ps1 build/base-package/publicInstaller.latest.ps1

        cp .dist/install-wizard/joincluster.sh build/base-package

        '
    - name: Release public files
      uses: softprops/action-gh-release@v1
      with:
        name: v${{ github.event.inputs.tags }} Release
        tag_name: ${{ github.event.inputs.tags }}
        files: 'install-wizard-v${{ github.event.inputs.tags }}.tar.gz

          build/base-package/publicInstaller.sh

          build/base-package/publicInstaller.latest

          build/base-package/install.sh

          build/base-package/publicInstaller.latest.ps1

          build/base-package/install.ps1

          build/base-package/publicAddnode.sh

          build/base-package/joincluster.sh

          build/base-package/version.hint

          build/base-package/publicRestoreInstaller.sh

          '
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
