name: Build and Upload Redis
'on':
  workflow_dispatch: null
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
    - name: Install coscmd
      run: pip install coscmd
    - name: Configure coscmd
      env:
        TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
        TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        COS_BUCKET: ${{ secrets.COS_BUCKET }}
        COS_REGION: ${{ secrets.COS_REGION }}
        END_POINT: ${{ secrets.END_POINT }}
      run: "coscmd config -a $TENCENT_SECRET_ID \\\n              -s $TENCENT_SECRET_KEY\
        \ \\\n              -b $COS_BUCKET \\\n              -r $COS_REGION \n"
    - run: 'bash build/build-redis.sh linux/amd64

        '
  push-arm64:
    runs-on: ubuntu-latest
    steps:
    - name: Clean
      run: 'sudo rm -rf redis*

        '
    - name: Checkout source code
      uses: actions/checkout@v3
    - name: Install tools
      run: 'sudo apt install -y make gcc

        '
    - name: Install coscmd
      run: pip install coscmd
    - name: Configure coscmd
      env:
        TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
        TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        COS_BUCKET: ${{ secrets.COS_BUCKET }}
        COS_REGION: ${{ secrets.COS_REGION }}
        END_POINT: ${{ secrets.END_POINT }}
      run: "coscmd config -a $TENCENT_SECRET_ID \\\n              -s $TENCENT_SECRET_KEY\
        \ \\\n              -b $COS_BUCKET \\\n              -r $COS_REGION \n"
    - run: 'sudo -E sh -c "bash build/build-redis.sh linux/arm64 && rm -rf redis*"

        '
